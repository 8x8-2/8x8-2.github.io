    <meta name="twitter:image" content="https://stellar-id.com/src/img/og-stellarid.png" />
    <script>
      (function redirectPrettyProfilePath() {
        var cleanPath = window.location.pathname.replace(/\/+$/, "");

        if (/^\/\d{1,16}$/.test(cleanPath)) {
          var stellarId = cleanPath.slice(1);
          var target = new URL("/profile/", window.location.origin);
          target.searchParams.set("sid", stellarId);
          if (window.location.hash) target.hash = window.location.hash;
          window.location.replace(target.toString());
          return;
        }

        window.location.replace(new URL("/", window.location.origin).toString());
      })();
    </script>
