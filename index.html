<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#f1f2f3">
    <link rel="icon" href="/src/img/bi/favicon-soulscan.png" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="/src/img/bi/favicon-soulscan.png">
    <link rel="manifest" href="/src/img/bi/favicon-soulscan.png">
    <title>소울 스캔 | 생년월일로 보는 내 운명 사주</title>
    <link rel="stylesheet" href="/styles.css" />
    <meta name="robots" content="index,follow,max-image-preview:large">
    <link rel="canonical" href="https://8x8-2.github.io">
    <meta name="author" content="C.B. Lee">
    <meta name="publisher" content="The Mercenary">
    <meta property="og:title" content="소울 스캔 | 생년월일로 보는 내 운명 사주">
    <meta property="og:description" content="무료 사주 풀이 서비스 소울 스캔. 생년월일 입력으로 사주팔자, 타고난 운명, 성향과 인생 흐름을 간편하게 확인할 수 있습니다.">
    <meta property="og:image" content="https://8x8-2.github.io/src/img/bi/symbol-soulscan.png">
    <meta property="og:image:alt" content="소울 스캔 무료 사주 웹사이트">
    <meta property="og:url" content="https://8x8-2.github.io">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="소울 스캔">
    <meta property="og:locale" content="ko_KR">
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/" aria-label="Soul Scan 홈">
          <span class="brand-logo-slot" aria-hidden="true">
            <span class="brand-logo-placeholder">Logo</span>
          </span>
          <span class="brand-copy">
            <span class="brand-name">Soul Scan</span>
            <span class="brand-subtitle">Saju Reading</span>
          </span>
        </a>
      </div>
    </header>

    <main class="container">
      <h1>생년월일시 입력</h1>
      <p class="muted">입력은 한국시간(KST) 기준입니다.</p>

      <section class="card">
        <div class="row">
          <label class="field">
            <span>달력</span>
            <select id="calendar">
              <option value="solar">양력</option>
              <option value="lunar">음력</option>
            </select>
          </label>

          <label class="field checkbox">
            <input type="checkbox" id="leapMonth" disabled />
            <span>윤달(음력)</span>
          </label>

          <label class="field">
            <span>성별</span>
            <select id="gender">
              <option value="male">남</option>
              <option value="female">여</option>
            </select>
          </label>
        </div>

        <div class="grid grid-birth">
          <label class="field"><span>년</span><input id="yyyy" type="number" min="1900" max="2100" step="1" required value="1991" /></label>
          <label class="field"><span>월</span><input id="mm" type="number" min="1" max="12" step="1" required value="5" /></label>
          <label class="field"><span>일</span><input id="dd" type="number" min="1" max="31" step="1" required value="23" /></label>
          <label class="field field-time-input">
            <span>태어난 시간</span>
            <input id="birthTime" type="text" inputmode="numeric" placeholder="00:00" value="11:45" maxlength="5" aria-describedby="timeFeedback" pattern="^([01]\d|2[0-3]):[0-5]\d$|^24:00$" />
          </label>
          <label class="field checkbox time-unknown">
            <input type="checkbox" id="unknownTime" />
            <span>시간 모름</span>
          </label>
        </div>
        <p id="timeFeedback" class="error hidden">올바른 시간을 입력해 주세요.</p>

        <div class="actions">
          <button id="btnCalc">사주 보기</button>
          <span id="status" class="muted"></span>
        </div>

        <p id="error" class="error"></p>
      </section>

      <section id="result" class="card hidden">
        <h2>사주 원국</h2>
        <div class="pillars-wrap">
          <table class="saju-table" aria-label="사주 원국">
            <thead>
              <tr>
                <th scope="col"></th>
                <th scope="col">시</th>
                <th scope="col">일</th>
                <th scope="col">월</th>
                <th scope="col">년</th>
              </tr>
            </thead>
            <tbody id="pillars"></tbody>
          </table>
        </div>

        <h2>해석</h2>
        <div id="sections" class="stack"></div>
      </section>

<footer class="muted footer">
        <small>© <script>document.write(new Date().getFullYear())</script>. <a href="https://themercenary.org" target="_blank">The Mercenary</a></small>
      </footer>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
