<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>충쫀</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>사주 결과 (MVP)</h1>
      <p class="muted">입력은 한국시간(KST) 기준입니다.</p>

      <section class="card">
        <div class="row">
          <label class="field">
            <span>달력</span>
            <select id="calendar">
              <option value="solar">양력</option>
              <option value="lunar">음력</option>
            </select>
          </label>

          <label class="field checkbox">
            <input type="checkbox" id="leapMonth" disabled />
            <span>윤달(음력)</span>
          </label>

          <label class="field">
            <span>성별</span>
            <select id="gender">
              <option value="male">남</option>
              <option value="female">여</option>
            </select>
          </label>
        </div>

        <div class="grid grid-birth">
          <label class="field"><span>년</span><input id="yyyy" type="number" min="1900" max="2100" step="1" required value="1991" /></label>
          <label class="field"><span>월</span><input id="mm" type="number" min="1" max="12" step="1" required value="5" /></label>
          <label class="field"><span>일</span><input id="dd" type="number" min="1" max="31" step="1" required value="23" /></label>
          <label class="field field-time-input">
            <span>태어난 시간</span>
            <input id="birthTime" type="text" inputmode="numeric" placeholder="00:00" value="11:45" maxlength="5" aria-describedby="timeFeedback" pattern="^([01]\d|2[0-3]):[0-5]\d$|^24:00$" />
          </label>
          <label class="field checkbox time-unknown">
            <input type="checkbox" id="unknownTime" />
            <span>시간 모름</span>
          </label>
        </div>
        <p id="timeFeedback" class="error hidden">올바른 시간을 입력해 주세요.</p>

        <div class="actions">
          <button id="btnCalc">사주 보기</button>
          <span id="status" class="muted"></span>
        </div>

        <p id="error" class="error"></p>
      </section>

      <section id="result" class="card hidden">
        <h2>사주 원국</h2>
        <div class="pillars-wrap">
          <table class="saju-table" aria-label="사주 원국">
            <thead>
              <tr>
                <th scope="col"></th>
                <th scope="col">시</th>
                <th scope="col">일</th>
                <th scope="col">월</th>
                <th scope="col">년</th>
              </tr>
            </thead>
            <tbody id="pillars"></tbody>
          </table>
        </div>

        <h2>해석</h2>
        <div id="sections" class="stack"></div>
      </section>

<footer class="muted footer">
        <small>© <script>document.write(new Date().getFullYear())</script>. <a href="https://themercenary.org" target="_blank">The Mercenary</a></small>
      </footer>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
