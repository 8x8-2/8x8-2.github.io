name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Trigger source
        required: false
        default: manual
        type: string
      stellar_id:
        description: Updated stellar ID
        required: false
        default: ""
        type: string
  schedule:
    - cron: "17 18 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Validate required environment variables
        run: |
          test -n "$VITE_SUPABASE_URL" || (echo "Missing VITE_SUPABASE_URL repository variable" && exit 1)
          test -n "$VITE_SUPABASE_PUBLISHABLE_KEY" || (echo "Missing VITE_SUPABASE_PUBLISHABLE_KEY repository variable" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Preserve custom domain
        run: |
          if [ -f CNAME ]; then cp CNAME dist/CNAME; fi
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
