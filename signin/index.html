<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="theme-color" content="#111314">
    <link rel="icon" href="/favicon-stellarid.png" sizes="any">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon-stellarid.png">
    <title>로그인 | 스텔라 ID</title>
    <link rel="stylesheet" href="/styles.css" />
    <meta name="description" content="스텔라 ID 로그인 페이지입니다. 저장한 스텔라 프로필과 무료 사주 결과를 이어서 보려면 로그인해 주세요.">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RQ5VKHW9NE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = function gtag() { window.dataLayer.push(arguments); };
      window.gtag("js", new Date());
      window.gtag("config", "G-RQ5VKHW9NE", {
        page_title: document.title,
        page_path: window.location.pathname,
        page_location: window.location.href,
      });
    </script>
  </head>
  <body
    data-page-name="signin"
    data-link-home="../"
    data-link-soulday="../soulday/"
    data-link-signin="./"
    data-link-signup="../signup/"
    data-link-saved="../saved/"
    data-auth-mode="hidden"
  >
    <header class="social-header-shell">
      <div class="container">
        <div data-social-nav></div>
      </div>
    </header>

    <main class="container">
      <section class="card auth-card" aria-labelledby="signin-heading">
        <p class="eyebrow">로그인</p>
        <h1 id="signin-heading">저장한 스텔라 프로필을 이어서 보려면 로그인해 주세요</h1>
        <p class="hero-subtitle">스텔라 ID를 만들면 무료 사주 결과 저장과 스텔라 프로필 관리, 앞으로 추가될 관계 기반 소셜 기능까지 이어서 사용할 수 있습니다.</p>

        <div id="signinConfigError" class="box hidden auth-helper-box">
          <div class="title">Supabase 연결이 아직 설정되지 않았습니다.</div>
          <div class="text">`.env.local`에 `VITE_SUPABASE_URL`과 `VITE_SUPABASE_PUBLISHABLE_KEY`를 먼저 넣어 주세요.</div>
        </div>

        <form id="signinForm" class="auth-form">
          <label class="field">
            <span>이메일 주소</span>
            <input id="signinEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
          </label>
          <label class="field">
            <span>비밀번호</span>
            <input id="signinPassword" type="password" autocomplete="current-password" placeholder="비밀번호 입력" required />
          </label>

          <button type="submit">로그인</button>
          <span id="signinStatus" class="muted"></span>
          <p id="signinError" class="error"></p>
        </form>

        <div class="auth-secondary">
          <p class="muted">아직 회원이 아니라면, 아래에서 바로 가입할 수 있습니다.</p>
          <a class="text-link-button auth-secondary-link" href="../signup/">스텔라 ID 만들기</a>
        </div>
      </section>

      <footer class="muted footer">
        <small class="footer-meta">
          <span>© <script>document.write(new Date().getFullYear())</script>.</span>
          <span class="footer-divider" aria-hidden="true">·</span>
          <a href="/privacy/" data-footer-link="privacy">개인정보처리방침</a>
          <span class="footer-divider" aria-hidden="true">·</span>
          <a href="https://themercenary.org" target="_blank" data-footer-link="mercenary">The Mercenary</a>
        </small>
      </footer>
    </main>

    <script type="module" src="/src/signin.js"></script>
  </body>
</html>
