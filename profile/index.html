  <head>

    <link rel="canonical" href="https://stellar-id.com/profile/" />
    <meta property="og:title" content="스텔라 프로필 | 스텔라 ID" />
    <meta property="og:description" content="스텔라 ID 유저의 공개 스텔라 프로필과 무료 사주 요약, 관계성, 대세운을 확인해 보세요." />
    <meta property="og:image" content="https://stellar-id.com/og-stellarid.png" />
    <meta property="og:image:secure_url" content="https://stellar-id.com/og-stellarid.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1920" />
    <meta property="og:image:height" content="1080" />
    <meta property="og:image:alt" content="스텔라 프로필 공유 미리보기" />
    <meta property="og:type" content="profile" />
    <meta property="og:site_name" content="스텔라 ID" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:url" content="https://stellar-id.com/profile/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="스텔라 프로필 | 스텔라 ID" />
    <meta name="twitter:description" content="스텔라 ID 유저의 공개 스텔라 프로필과 무료 사주 요약, 관계성, 대세운을 확인해 보세요." />
    <meta name="twitter:image" content="https://stellar-id.com/og-stellarid.png" />
    <meta name="twitter:image:alt" content="스텔라 프로필 공유 미리보기" />
    <script type="application/ld+json" id="profileStructuredData">{}</script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body
    data-page-name="public_profile"
    data-link-home="../"
    data-link-signin="../signin/"
    data-link-signup="../signup/"
    data-link-search="../search/"
    data-link-public-profile="./"
    data-link-saved="../saved/"
    data-link-account="../p/"
    data-link-profile-settings="../profile-settings/"
  >
    <header class="social-header-shell">
      <div class="container">
        <div data-social-nav></div>
      </div>
    </header>

    <main class="container profile-page-shell">
      <section id="profilePageError" class="card hidden"></section>

      <section id="profileLoading" class="card hero-card">
        <p class="eyebrow">스텔라 프로필</p>
        <h1>스텔라 프로필을 불러오는 중입니다</h1>
        <p class="hero-subtitle">잠시만 기다려 주세요.</p>
      </section>

      <section id="profileSeoFallback" class="card hidden"></section>

      <section id="profileHero" class="card hidden" aria-labelledby="profileNameHeading">
        <div id="profileHeroInner"></div>
      </section>

      <section id="profileTabsSection" class="card hidden profile-tabs-card">
        <div id="profileTabs" class="profile-tab-strip" role="tablist" aria-label="스텔라 프로필 탭"></div>
      </section>

      <section id="profileContent" class="stack hidden"></section>

      <footer class="muted footer" data-site-footer></footer>
    </main>

    <script type="module" src="/src/public-profile.js"></script>
  </body>
</html>
